name: Notion Sync

# Sincroniza el estado del repo con el panel de control en Notion (Fábrica de Webs).
# Se dispara en cada push a main y, manualmente, desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Evita ejecuciones solapadas para el mismo repo.
concurrency:
  group: notion-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sincronizar a Notion
        env:
          # Secrets en Settings → Secrets and variables → Actions.
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }} # integración "GitHub Actions Webs y Despliegues"
          NOTION_WEBS_DB: ${{ secrets.NOTION_WEBS_DB }} # [AKE] - Webs/Repos
          NOTION_DEPLOYS_DB: ${{ secrets.NOTION_DEPLOYS_DB }} # [AKE] - Despliegues
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_URL: ${{ github.event.repository.html_url }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          BRANCH: ${{ github.ref_name }}
        run: node scripts/notion-sync.mjs
