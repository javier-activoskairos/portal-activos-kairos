name: Sync Logos Empresa (Notion → Supabase Storage)

# Descarga el logo de cada empresa desde [AK] - Empresas y lo re-hospeda en
# Supabase Storage (bucket company-logos). Notion sigue siendo la fuente.
# Reloj: n8n (workflow "Portal - Reloj de Sincronizaciones") lo lanza vía
# workflow_dispatch. Aquí ya no hay cron propio.
on:
  workflow_dispatch: {}

concurrency:
  group: sync-company-logos
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run sync:logos
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
