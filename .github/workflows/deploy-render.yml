name: Deploy a Render (push → main)

# Dispara un deploy en Render en cada push a main. Sustituye al webhook nativo
# GitHub → Render (ausente en este repo), que dejaba autoDeploy sin efecto.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-render
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Lanzar deploy en Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d98i8s3eo5us73dikcn0
        run: |
          resp=$(curl -sS -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}')
          echo "$resp"
          id=$(echo "$resp" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))")
          if [ -z "$id" ]; then echo "::error::Render no devolvió deploy id"; exit 1; fi
          echo "Deploy lanzado: $id"
