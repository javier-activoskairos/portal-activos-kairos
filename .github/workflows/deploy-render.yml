name: Deploy a Render (push → main)

# Dispara un deploy en Render en cada push a main. Sustituye al webhook nativo
# GitHub → Render (ausente en este repo), que dejaba autoDeploy sin efecto.
# Tolera que ya exista un deploy para el mismo commit (lanzado a mano o por un
# push casi simultáneo): en ese caso no duplica y termina OK.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-render
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Lanzar deploy en Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: srv-d98i8s3eo5us73dikcn0
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          API="https://api.render.com/v1/services/${RENDER_SERVICE_ID}"

          # Id del deploy vivo para este commit, si lo hay.
          deploy_vivo() {
            curl -sS "${API}/deploys?limit=5" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
            | jq -r --arg sha "${SHA}" '
                [ .[]
                  | (.deploy // .)
                  | select(.commit.id == $sha)
                  | select(.status | IN("queued","build_in_progress","update_in_progress","live"))
                  | .id
                ] | first // ""
              ' 2>/dev/null
          }

          ya="$(deploy_vivo)"
          if [ -n "${ya}" ]; then
            echo "Ya existe un deploy para ${SHA} (${ya}); no se duplica."
            exit 0
          fi

          for intento in 1 2 3; do
            code="$(curl -sS -o /tmp/resp.json -w '%{http_code}' -X POST \
              "${API}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}')"
            echo "intento ${intento} → HTTP ${code}"
            cat /tmp/resp.json 2>/dev/null || true
            echo

            id="$(jq -r '.id // ""' /tmp/resp.json 2>/dev/null || echo "")"
            if [ -n "${id}" ]; then
              echo "Deploy lanzado: ${id}"
              exit 0
            fi

            ya="$(deploy_vivo)"
            if [ -n "${ya}" ]; then
              echo "Deploy ya en curso (${ya}); damos por bueno."
              exit 0
            fi
            sleep 6
          done

          echo "::error::Render no devolvió deploy id tras 3 intentos"
          exit 1
