name: Sync Incidencias (Notion → Supabase)

# Sincroniza [AKE] - Incidencias de la empresa Activos Kairos hacia la réplica
# Supabase cada 10 minutos. Notion sigue siendo la fuente de verdad.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-incidents
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run sync:incidents
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ASSETS_DB: ${{ secrets.NOTION_ASSETS_DB }}
          NOTION_INCIDENTS_DB: ${{ secrets.NOTION_INCIDENTS_DB }}
          AK_COMPANY_NOTION_ID: ${{ secrets.AK_COMPANY_NOTION_ID }}
