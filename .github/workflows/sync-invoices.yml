name: Sync Facturas (Notion → Supabase)

# Facturas emitidas de [AKF] - Facturas hacia public.invoices, por empresa
# externa del portal (excluye Activos Kairos). Re-hospeda el PDF.
on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-invoices
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run sync:invoices
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          AK_COMPANY_NOTION_ID: ${{ secrets.AK_COMPANY_NOTION_ID }}
